# WorldNovel — Development Services
# Qdrant (vector search) + Neo4j (graph database)
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose up qdrant -d   # Start only Qdrant
#   docker compose up neo4j -d    # Start only Neo4j
#
# The application works without these services (SQLite fallback).
# Enable via .env:
#   NOVEL_QDRANT_ENABLED=true
#   NOVEL_NEO4J_ENABLED=true

services:
  qdrant:
    image: qdrant/qdrant:v1.8.4
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5.18-community
    environment:
      - NEO4J_AUTH=neo4j/worldengine
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - ./data/neo4j:/data
    restart: unless-stopped
